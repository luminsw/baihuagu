name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── SDK 单元测试（Linux 跑最快） ──
  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test tests/BaihuaguSdk.Tests/BaihuaguSdk.Tests.csproj -c Release

  # ── Android 编译（Linux） ──
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: sdk-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install MAUI workloads
        run: dotnet workload install maui-android
      - name: Build Android
        run: dotnet build clients/MobileApp.Maui/MobileApp.Maui.csproj -f net10.0-android -c Release

  # ── iOS 编译（macOS） ──
  ios-build:
    name: iOS Build
    runs-on: macos-latest
    needs: sdk-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install MAUI workloads
        run: |
          dotnet workload install maui-ios
          dotnet workload install maui-android  # 多目标 csproj 需要
      - name: Build iOS
        run: dotnet build clients/MobileApp.Maui/MobileApp.Maui.csproj -f net10.0-ios -c Release
