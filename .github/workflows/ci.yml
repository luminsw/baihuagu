name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # ── SDK + 服务端单元测试（Linux 跑最快） ──
  sdk-tests:
    name: SDK & Service Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run BaihuaguSdk tests
        run: dotnet test tests/BaihuaguSdk.Tests/BaihuaguSdk.Tests.csproj -c Release

      - name: Run MobileApp.Maui tests
        run: dotnet test tests/MobileApp.Maui.Tests/MobileApp.Maui.Tests.csproj -c Release

      - name: Run TaskRunner.Family tests
        run: dotnet test tests/TaskRunner.Family.Tests/TaskRunner.Family.Tests.csproj -c Release

  # ── 服务端全方案编译（防止 Contract/适配器变更后编译失败） ──
  family-build:
    name: Family Solution Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build BaiHuaGu solution
        run: dotnet build services/BaiHuaGu.slnx -c Release

  # ── Android 编译（.NET 9 MAUI） ──
  android-build:
    name: Android MAUI Build
    runs-on: ubuntu-latest
    needs: sdk-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-maui-${{ hashFiles('clients/**/*.csproj', 'libs/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-maui-
            ${{ runner.os }}-nuget-

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Build Android
        run: dotnet build clients/MobileApp.Maui/MobileApp.Maui.csproj -f net9.0-android -c Release
