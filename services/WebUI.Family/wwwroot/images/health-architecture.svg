<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img" aria-labelledby="t d">
  <title id="t">Health Check Architecture</title>
  <desc id="d">Browser - WebUI - Task Runner. Task Runner checks Git, Obsidian, Ollama, Python, Node.js, and PIP in parallel.</desc>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6c757d"/>
    </marker>
    <filter id="s" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="300" y="16" width="320" height="56" rx="8" fill="#fff" stroke="#0d6efd" stroke-width="2" filter="url(#s)"/>
  <text x="460" y="40" text-anchor="middle" font-size="15" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">WebUI (this page)</text>
  <text x="460" y="58" text-anchor="middle" font-size="12" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">Shows report and durations</text>

  <line x1="460" y1="72" x2="460" y2="104" stroke="#6c757d" stroke-width="2" marker-end="url(#a)"/>

  <rect x="250" y="108" width="420" height="64" rx="8" fill="#fff" stroke="#198754" stroke-width="2" filter="url(#s)"/>
  <text x="460" y="135" text-anchor="middle" font-size="15" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">Task Runner service</text>
  <text x="460" y="155" text-anchor="middle" font-size="12" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">GET /api/health/full (parallel checks)</text>

  <line x1="460" y1="172" x2="460" y2="198" stroke="#6c757d" stroke-width="2" marker-end="url(#a)"/>

  <g transform="translate(0, 202)">
    <!-- 6 * 132 + 5 * 14 = 862; (920-862)/2 = 29 -->
    <rect x="29"  y="0" width="132" height="72" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1.5" filter="url(#s)"/>
    <text x="95"  y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">Git</text>
    <text x="95"  y="48" text-anchor="middle" font-size="10.5" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">VCS / sync</text>

    <rect x="175" y="0" width="132" height="72" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1.5" filter="url(#s)"/>
    <text x="241" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">Obsidian</text>
    <text x="241" y="48" text-anchor="middle" font-size="10.5" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">Vault / desktop</text>

    <rect x="321" y="0" width="132" height="72" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1.5" filter="url(#s)"/>
    <text x="387" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">Ollama</text>
    <text x="387" y="48" text-anchor="middle" font-size="10.5" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">LLM :11434</text>

    <rect x="467" y="0" width="132" height="72" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1.5" filter="url(#s)"/>
    <text x="533" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">Python</text>
    <text x="533" y="48" text-anchor="middle" font-size="10.5" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">runtime</text>

    <rect x="613" y="0" width="132" height="72" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1.5" filter="url(#s)"/>
    <text x="679" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">Node.js</text>
    <text x="679" y="48" text-anchor="middle" font-size="10.5" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">tooling</text>

    <rect x="759" y="0" width="132" height="72" rx="6" fill="#fff" stroke="#dee2e6" stroke-width="1.5" filter="url(#s)"/>
    <text x="825" y="28" text-anchor="middle" font-size="13" font-weight="600" fill="#212529" font-family="system-ui,Segoe UI,Roboto,sans-serif">PIP</text>
    <text x="825" y="48" text-anchor="middle" font-size="10.5" fill="#6c757d" font-family="system-ui,Segoe UI,Roboto,sans-serif">packages</text>
  </g>
</svg>
