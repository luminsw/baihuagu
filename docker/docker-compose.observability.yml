services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: bhg-openobserve
    restart: unless-stopped
    ports:
      - "5082:5080"
      - "5083:5081"
    volumes:
      - bhg-oo-data:/data
    environment:
      ZO_ROOT_USER_EMAIL: root@localhost.com
      ZO_ROOT_USER_PASSWORD: Complexpass#123
      ZO_DATA_DIR: /data
      ZO_COMPACT_DATA_RETENTION_DAYS: 7

  hostmetrics:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: bhg-hostmetrics
    profiles: ["linux"]
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/hostfs/proc:ro
      - /sys:/hostfs/sys:ro
      - /:/hostfs:ro
      - /etc:/hostfs/etc:ro
      - ./otel-hostmetrics.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      - OO_AUTH_HEADER=cm9vdEBsb2NhbGhvc3QuY29tOkNvbXBsZXhwYXNzIzEyMw==
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - openobserve

volumes:
  bhg-oo-data:
